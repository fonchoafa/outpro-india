# render.yaml
services:
  - type: web
    name: outpro-india-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    autoDeploy: true